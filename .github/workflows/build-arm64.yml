name: Build ARM64 FreeFileSync

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    name: Build on ARM64 (aarch64)
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Package ARM64
      id: build
      run: |
        docker run --rm \
          --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -v ${{ github.workspace }}/arm64-build:/output \
          -w /workspace \
          ubuntu:24.04 \
          bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            
            apt-get update
            apt-get install -y \
              software-properties-common \
              dpkg-dev debhelper fakeroot \
              libssl-dev libcurl4-openssl-dev \
              libidn2-dev libssh2-1-dev \
              libgtk-3-dev libselinux1-dev \
              wget curl unzip bzip2
            add-apt-repository -y ppa:ubuntu-toolchain-r/test
            apt-get update
            apt-get install -y \
              gcc-14 g++-14 make pkg-config
            update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
            update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
            
            echo '=== Downloading wxWidgets 3.3.2 ==='
            cd /tmp
            wget -q https://github.com/wxWidgets/wxWidgets/releases/download/v3.3.2/wxWidgets-3.3.2.tar.bz2
            tar xf wxWidgets-3.3.2.tar.bz2
            cd wxWidgets-3.3.2
            
            echo '=== Configuring wxWidgets ==='
            ./configure \
              --prefix=/usr/local \
              --disable-shared \
              --with-gtk=3 \
              --without-wayland \
              --without-opengl
            
            echo '=== Compiling wxWidgets ==='
            make -j\$(nproc)
            
            echo '=== Installing wxWidgets ==='
            make install
            ldconfig
            
            echo '=== Building FreeFileSync ==='
            cd /workspace/FreeFileSync/Source
            make -j\$(nproc) WX_CONFIG=/usr/local/bin/wx-config
            
            echo '=== Build Results ==='
            mkdir -p /output
            cp -v ../Build/Bin/FreeFileSync /output/ 2>/dev/null || true
            cp -v ../Build/Bin/RealTimeSync /output/ 2>/dev/null || true
            
            echo '=== Collecting shared libraries ==='
            mkdir -p /output/libs
            for lib in \$(ldd ../Build/Bin/FreeFileSync 2>/dev/null | grep '=>' | awk '{print \$3}' | grep -v '^$' | grep -v '/linux' | grep -v 'not'); do
              if [ -f \"\$lib\" ]; then
                cp -v \"\$lib\" /output/libs/ 2>/dev/null || true
              fi
            done
            cp -v /usr/local/lib/*.so* /output/libs/ 2>/dev/null || true
            
            echo '=== Creating DEB Package ==='
            cd /output
            
            # Create DEB package structure
            mkdir -p deb/DEBIAN
            mkdir -p deb/usr/bin
            mkdir -p deb/usr/lib/freefilesync
            mkdir -p deb/usr/share/applications
            
            cp -v FreeFileSync deb/usr/bin/ 2>/dev/null || true
            cp -v RealTimeSync deb/usr/bin/ 2>/dev/null || true
            cp -v libs/* deb/usr/lib/freefilesync/ 2>/dev/null || true
            
            printf 'Package: freefilesync\nVersion: 14.9\nSection: utils\nPriority: optional\nArchitecture: arm64\nDepends: libcurl4, libssl3, libgtk-3-0, libstdc++6\nMaintainer: lurney\nDescription: FreeFileSync ARM64 Build\n' > deb/DEBIAN/control
            
            printf '#!/bin/bash\nchmod +x /usr/bin/FreeFileSync\nchmod +x /usr/bin/RealTimeSync\nldconfig\n' > deb/DEBIAN/postinst
            chmod +x deb/DEBIAN/postinst
            
            printf '[Desktop Entry]\nType=Application\nName=FreeFileSync\nComment=Folder Comparison and Synchronization\nExec=/usr/bin/FreeFileSync\nIcon=freefilesync\nTerminal=false\nCategories=Utility;FileTools;\n' > deb/usr/share/applications/freefilesync.desktop
            
            echo '=== DEB Package Structure ==='
            find deb -type f | head -20
            
            # Fix ownership before building
            chown -R root:root deb/
            
            dpkg-deb --build --root-owner-group deb freefilesync_14.9_arm64.deb 2>&1
            ls -la *.deb
          "

    - name: Upload DEB Package
      uses: actions/upload-artifact@v4
      with:
        name: freefilesync-arm64-deb
        path: arm64-build/*.deb
        retention-days: 30

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: freefilesync-arm64-binaries
        path: |
          arm64-build/FreeFileSync
          arm64-build/RealTimeSync
          arm64-build/libs/
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          arm64-build/*.deb
          arm64-build/FreeFileSync
          arm64-build/RealTimeSync
          arm64-build/libs/*.so*
        name: FreeFileSync ${{ github.ref_name }}
        body: |
          FreeFileSync ARM64 Build
          
          Package: freefilesync_14.9_arm64.deb
          
          Built from commit: ${{ github.sha }}
          Build date: ${{ github.event.head_commit.timestamp }}
          
          Note: This build has dark mode temporarily disabled due to wxWidgets compatibility issues.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
