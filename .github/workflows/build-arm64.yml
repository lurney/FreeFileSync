name: Build ARM64 FreeFileSync

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    name: Build on ARM64 (aarch64)
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build ARM64 Binary in Docker
      run: |
        docker run --rm \
          --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ubuntu:24.04 \
          bash -c "
            export DEBIAN_FRONTEND=noninteractive
            
            # 更新软件源
            apt-get update
            
            # 安装构建工具和依赖
            apt-get install -y \
              build-essential \
              g++ \
              make \
              pkg-config \
              libwxgtk3.2-dev \
              libssl-dev \
              libcurl4-openssl-dev \
              libidn2-dev \
              libssh2-1-dev \
              libgtk-3-dev \
              libselinux1-dev
            
            # 验证架构
            echo 'Building on:'
            uname -m
            gcc --version
            
            # 编译 FreeFileSync
            echo '=== Building FreeFileSync ==='
            cd FreeFileSync/Source
            make clean 2>/dev/null || true
            make -j\$(nproc)
            
            # 编译 RealTimeSync
            echo '=== Building RealTimeSync ==='
            cd RealTimeSync
            make clean 2>/dev/null || true
            make -j\$(nproc)
            
            # 显示编译结果
            echo '=== Build Results ==='
            ls -la ../Build/Bin/ || ls -la ./*.o 2>/dev/null || echo 'Checking...'
            find /workspace -name 'FreeFileSync*' -o -name 'RealTimeSync*' 2>/dev/null | head -20
          "

    - name: Copy binaries from container
      run: |
        # 使用 docker cp 从临时容器中提取文件
        CONTAINER_ID=$(docker create --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          ubuntu:24.04 \
          bash -c "echo 'placeholder'")
        
        docker run --rm \
          --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ubuntu:24.04 \
          bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq build-essential g++ make pkg-config \
              libwxgtk3.2-dev libssl-dev libcurl4-openssl-dev \
              libidn2-dev libssh2-1-dev libgtk-3-dev libselinux1-dev
            cd FreeFileSync/Source && make -j\$(nproc)
            cd RealTimeSync && make -j\$(nproc)
            ls -la ../../Build/Bin/
          " || true
        
        # 直接执行编译并在容器内复制结果
        docker run --rm \
          --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ubuntu:24.04 \
          bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq build-essential g++ make pkg-config \
              libwxgtk3.2-dev libssl-dev libcurl4-openssl-dev \
              libidn2-dev libssh2-1-dev libgtk-3-dev libselinux1-dev
            cd FreeFileSync/Source && make -j\$(nproc)
            cd RealTimeSync && make -j\$(nproc)
            # 确保输出目录存在
            mkdir -p /output
            # 复制编译结果
            cp -v ../../Build/Bin/* /output/ 2>/dev/null || true
            ls -la /output/
          "
        
        # 创建工作目录收集结果
        mkdir -p ${{ github.workspace }}/arm64-build
        
        # 重新运行并复制文件到挂载的卷
        docker run --rm \
          --platform linux/arm64 \
          -v ${{ github.workspace }}/arm64-build:/output \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ubuntu:24.04 \
          bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -qq
            apt-get install -y -qq build-essential g++ make pkg-config \
              libwxgtk3.2-dev libssl-dev libcurl4-openssl-dev \
              libidn2-dev libssh2-1-dev libgtk-3-dev libselinux1-dev
            cd FreeFileSync/Source && make -j\$(nproc)
            cd RealTimeSync && make -j\$(nproc)
            cp -v ../../Build/Bin/* /output/ 2>/dev/null || true
          "

    - name: List build artifacts
      run: |
        echo '=== Build Artifacts ==='
        ls -la arm64-build/ || echo 'Directory not found'
        
        echo '=== Source Build Directory ==='
        ls -la FreeFileSync/Build/Bin/ 2>/dev/null || echo 'Not found in expected location'
        
        # 查找所有可能的输出文件
        find . -name 'FreeFileSync*' -type f 2>/dev/null | head -20
        find . -name 'RealTimeSync*' -type f 2>/dev/null | head -20

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: freefilesync-arm64
        path: |
          arm64-build/
          **/Build/Bin/*
          **/FreeFileSync_aarch64
          **/RealTimeSync_aarch64
        retention-days: 30
        if-no-files-found: ignore

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          arm64-build/*
        name: FreeFileSync ARM64 ${{ github.ref_name }}
        body: |
          FreeFileSync ARM64 (aarch64) build
          
          Built from commit: ${{ github.sha }}
          Build date: ${{ github.event.head_commit.timestamp }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
