name: Build ARM64 FreeFileSync

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    name: Build on ARM64 (aarch64)
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build ARM64 Binary in Docker
      id: build
      run: |
        docker run --rm \
          --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ubuntu:24.04 \
          bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            
            # 安装编译依赖 (GCC 14 for C++23 support)
            apt-get update
            apt-get install -y \
              software-properties-common
            add-apt-repository -y ppa:ubuntu-toolchain-r/test
            apt-get update
            apt-get install -y \
              gcc-14 g++-14 make pkg-config \
              libssl-dev libcurl4-openssl-dev \
              libidn2-dev libssh2-1-dev \
              libgtk-3-dev libselinux1-dev \
              wget curl unzip bzip2
            update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
            update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
            
            # ===== 编译 wxWidgets 3.3.2 =====
            echo '=== Downloading wxWidgets 3.3.2 ==='
            cd /tmp
            wget -q https://github.com/wxWidgets/wxWidgets/releases/download/v3.3.2/wxWidgets-3.3.2.tar.bz2
            tar xf wxWidgets-3.3.2.tar.bz2
            cd wxWidgets-3.3.2
            
            echo '=== Configuring wxWidgets ==='
            ./configure \
              --prefix=/usr/local \
              --disable-shared \
              --with-gtk=3 \
              --without-wayland \
              --without-opengl
            
            echo '=== Compiling wxWidgets (this takes ~15 min) ==='
            make -j\$(nproc)
            
            echo '=== Installing wxWidgets ==='
            make install
            ldconfig
            
            # 验证 wxWidgets 安装
            echo '=== Verifying wxWidgets installation ==='
            /usr/local/bin/wx-config --version
            /usr/local/bin/wx-config --cxxflags | grep colour
            
            # 检查 wxColorHook 是否在头文件中
            echo '=== Checking for wxColorHook ==='
            grep -r "wxColorHook" /usr/local/include/wx/ 2>/dev/null | head -5 || echo 'wxColorHook not found in headers'
            
            # ===== 编译 FreeFileSync =====
            echo '=== Building FreeFileSync ==='
            cd /workspace/FreeFileSync/Source
            
            # 使用 /usr/local/bin/wx-config
            make -j\$(nproc) WX_CONFIG=/usr/local/bin/wx-config
            
            echo '=== Build Results ==='
            ls -la ../Build/Bin/
          "

    - name: Copy binaries from container
      run: |
        mkdir -p ${{ github.workspace }}/arm64-build
        
        docker run --rm \
          --platform linux/arm64 \
          -v ${{ github.workspace }}/arm64-build:/output \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ubuntu:24.04 \
          bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            
            # 安装编译依赖 (GCC 14 for C++23 support)
            apt-get update -qq
            apt-get install -y -qq \
              software-properties-common
            add-apt-repository -y ppa:ubuntu-toolchain-r/test
            apt-get update -qq
            apt-get install -y -qq \
              gcc-14 g++-14 make pkg-config \
              libssl-dev libcurl4-openssl-dev \
              libidn2-dev libssh2-1-dev \
              libgtk-3-dev libselinux1-dev \
              wget unzip bzip2
            update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
            update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
            
            # 编译 wxWidgets
            cd /tmp
            wget -q https://github.com/wxWidgets/wxWidgets/releases/download/v3.3.2/wxWidgets-3.3.2.tar.bz2
            tar xf wxWidgets-3.3.2.tar.bz2
            cd wxWidgets-3.3.2
            ./configure --prefix=/usr/local --disable-shared --with-gtk=3 --without-wayland --without-opengl
            make -j\$(nproc)
            make install
            ldconfig
            
            # 验证 wxWidgets 安装
            echo '=== Verifying wxWidgets installation ==='
            /usr/local/bin/wx-config --version
            /usr/local/bin/wx-config --cxxflags | grep colour
            
            # 检查 wxColorHook 是否在头文件中
            echo '=== Checking for wxColorHook ==='
            grep -r "wxColorHook" /usr/local/include/wx/ 2>/dev/null | head -5 || echo 'wxColorHook not found in headers'
            
            # 编译 FreeFileSync
            cd /workspace/FreeFileSync/Source
            make -j\$(nproc) WX_CONFIG=/usr/local/bin/wx-config
            
            # 复制结果
            mkdir -p /output
            cp -v ../Build/Bin/* /output/ 2>/dev/null || true
            ls -la /output/
          "

    - name: List build artifacts
      run: |
        echo '=== Build Artifacts ==='
        ls -la arm64-build/ || echo 'Directory not found'
        find . -name 'FreeFileSync*' -type f 2>/dev/null | head -20

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: freefilesync-arm64
        path: |
          arm64-build/
          FreeFileSync/Build/Bin/*
        retention-days: 30
        if-no-files-found: error

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          arm64-build/*
        name: FreeFileSync ARM64 ${{ github.ref_name }}
        body: |
          FreeFileSync ARM64 (aarch64) build
          
          Built from commit: ${{ github.sha }}
          Build date: ${{ github.event.head_commit.timestamp }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
