name: Build ARM64 FreeFileSync

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    name: Build on ARM64 (aarch64)
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/arm64

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build ARM64 Binary in Docker
      id: build
      run: |
        docker run --rm \
          --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ubuntu:22.04 \
          bash -c "
            set -e  # 遇到错误立即退出
            export DEBIAN_FRONTEND=noninteractive
            
            # 更新软件源
            apt-get update
            
            # 安装构建工具和依赖（使用 Ubuntu 22.04 自带的 wxWidgets 3.2.0）
            apt-get install -y \
              build-essential \
              g++ \
              make \
              pkg-config \
              libwxgtk3.0-gtk3-dev \
              libssl-dev \
              libcurl4-openssl-dev \
              libidn2-dev \
              libssh2-1-dev \
              libgtk-3-dev \
              libselinux1-dev
            
            # 验证架构
            echo '=== Building on ==='
            uname -m
            gcc --version
            
            # 编译 FreeFileSync
            echo '=== Building FreeFileSync ==='
            cd FreeFileSync/Source
            make clean 2>/dev/null || true
            make -j\$(nproc)
            
            # 编译 RealTimeSync
            echo '=== Building RealTimeSync ==='
            cd ../RealTimeSync
            make clean 2>/dev/null || true
            make -j\$(nproc)
            
            # 创建输出目录并复制编译结果
            mkdir -p /output
            cp -v ../Build/Bin/* /output/ 2>/dev/null || true
            ls -la /output/
            
            echo '=== Build completed successfully ==='
          "

    - name: Copy binaries from container
      run: |
        mkdir -p ${{ github.workspace }}/arm64-build
        
        docker run --rm \
          --platform linux/arm64 \
          -v ${{ github.workspace }}/arm64-build:/output \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          ubuntu:22.04 \
          bash -c "
            set -e
            export DEBIAN_FRONTEND=noninteractive
            
            apt-get update -qq
            apt-get install -y -qq \
              build-essential g++ make pkg-config \
              libwxgtk3.0-gtk3-dev libssl-dev libcurl4-openssl-dev \
              libidn2-dev libssh2-1-dev libgtk-3-dev libselinux1-dev
            
            cd FreeFileSync/Source && make -j\$(nproc)
            cd ../RealTimeSync && make -j\$(nproc)
            
            mkdir -p /output
            cp -v ../Build/Bin/* /output/ || true
            ls -la /output/
          "

    - name: List build artifacts
      run: |
        echo '=== Build Artifacts ==='
        ls -la arm64-build/ || echo 'Directory not found'
        
        echo '=== Source Build Directory ==='
        ls -la FreeFileSync/Build/Bin/ 2>/dev/null || echo 'Not found in expected location'
        
        # 查找所有可能的输出文件
        find . -name 'FreeFileSync*' -type f 2>/dev/null | head -20
        find . -name 'RealTimeSync*' -type f 2>/dev/null | head -20

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: freefilesync-arm64
        path: |
          arm64-build/
          FreeFileSync/Build/Bin/*
        retention-days: 30
        if-no-files-found: error  # 找不到文件时失败，而不是忽略

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          arm64-build/*
        name: FreeFileSync ARM64 ${{ github.ref_name }}
        body: |
          FreeFileSync ARM64 (aarch64) build
          
          Built from commit: ${{ github.sha }}
          Build date: ${{ github.event.head_commit.timestamp }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
